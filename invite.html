<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Title and link preview tags are populated from config.js by the script at the bottom -->
<title>Loading invitation…</title>
<meta property="og:type" content="website">
<meta property="og:title" content="You're Invited">
<meta property="og:description" content="Tap to open your invitation.">
<meta property="og:image" content="cover.png">
<meta property="og:image:width" content="1060">
<meta property="og:image:height" content="1500">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="You're Invited">
<meta name="twitter:description" content="Tap to open your invitation.">
<meta name="twitter:image" content="cover.png">
<meta name="theme-color" content="#0d2a52">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Tenor+Sans&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<!-- Load card configuration -->
<script src="config.js"></script>

<style>
  :root {
    --ink: #1a3a6b;
    --ink-soft: #2d4a7a;
    --gold: #c9a961;
    --cream: #f5ecd6;
    --cream-warm: #faf3e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--ink);
    position: relative;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: #f5ecd6; border-radius: 50%; opacity: 0;
    animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 6px #f5ecd6; }
  }

  .stage { position: relative; z-index: 1; width: 100%; max-width: 560px; perspective: 2000px; }

  /* ===== ENVELOPE ===== */
  .envelope {
    position: relative; width: 100%; aspect-ratio: 1060 / 1500;
    cursor: pointer; transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s ease;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 10px 30px rgba(0, 0, 0, 0.4),
      0 0 0 1px rgba(201, 169, 97, 0.3);
    border-radius: 6px;
    overflow: hidden;
  }
  .envelope.opened { transform: translateY(-30px) scale(0.92) rotateX(8deg); opacity: 0; pointer-events: none; }
  .envelope-cover { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
  .envelope::after {
    content: ''; position: absolute; inset: 0;
    border: 1px solid rgba(201, 169, 97, 0.4);
    border-radius: 6px; pointer-events: none;
  }

  .open-hint {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(245, 236, 214, 0.95); color: var(--ink);
    padding: 12px 28px; border-radius: 100px;
    font-family: 'Tenor Sans', serif; font-size: 12px;
    letter-spacing: 0.25em; text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid var(--gold);
    animation: pulseHint 2.4s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes pulseHint {
    0%, 100% { transform: translateX(-50%) translateY(0); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    50% { transform: translateX(-50%) translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
  }

  /* ===== CARD ===== */
  .card {
    position: absolute; inset: 0;
    background: var(--cream-warm); border-radius: 6px;
    padding: 56px 44px 44px;
    opacity: 0; transform: translateY(60px) scale(0.96);
    transition: opacity 1s ease 0.6s, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s;
    overflow-y: auto;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.5),
      0 10px 30px rgba(0, 0, 0, 0.3),
      inset 0 0 80px rgba(201, 169, 97, 0.08);
    background-image:
      radial-gradient(ellipse at top, rgba(201, 169, 97, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse at bottom, rgba(26, 58, 107, 0.06) 0%, transparent 70%);
  }
  .card.shown { opacity: 1; transform: translateY(0) scale(1); position: relative; }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(201, 169, 97, 0.015) 2px, rgba(201, 169, 97, 0.015) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(26, 58, 107, 0.01) 2px, rgba(26, 58, 107, 0.01) 4px);
    pointer-events: none; border-radius: 6px;
  }

  .card-inner {
    position: relative;
    border: 1px solid var(--gold); border-radius: 2px;
    padding: 36px 28px 32px; text-align: center;
  }
  .card-inner::before, .card-inner::after {
    content: ''; position: absolute; width: 18px; height: 18px;
    border: 1px solid var(--gold);
  }
  .card-inner::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
  .card-inner::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }

  .compass { width: 38px; height: 38px; margin: 0 auto 18px; color: var(--gold);
             opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards; }

  .eyebrow {
    font-family: 'Tenor Sans', serif; font-size: 10px;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 14px;
    opacity: 0; animation: fadeUp 0.8s ease 1.3s forwards;
  }

  .hosts {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500;
    font-size: clamp(28px, 5.5vw, 38px); color: var(--ink);
    line-height: 1; margin-bottom: 6px;
    opacity: 0; animation: fadeUp 0.8s ease 1.4s forwards;
  }
  .amp { color: var(--gold); font-weight: 400; }

  .intro {
    font-family: 'Tenor Sans', serif; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft); margin: 8px 0 18px;
    opacity: 0; animation: fadeUp 0.8s ease 1.45s forwards;
  }

  .honorees {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(20px, 4vw, 24px); color: var(--ink); margin-bottom: 8px;
    opacity: 0; animation: fadeUp 0.8s ease 1.5s forwards;
  }

  .subhead {
    font-family: 'Tenor Sans', serif; font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft); margin: 6px 0 4px;
    opacity: 0; animation: fadeUp 0.8s ease 1.55s forwards;
  }

  .feature {
    font-family: 'Cormorant Garamond', serif; font-weight: 600;
    font-size: clamp(46px, 9vw, 64px); letter-spacing: 0.04em;
    color: var(--ink); line-height: 1; text-transform: uppercase;
    text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    opacity: 0; animation: fadeUp 0.8s ease 1.6s forwards;
  }

  .ornament {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin: 22px 0;
    opacity: 0; animation: fadeUp 0.8s ease 1.7s forwards;
  }
  .ornament-line { flex: 1; max-width: 70px; height: 1px;
                   background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ornament-shell { color: var(--gold); font-size: 14px; }

  .tagline {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(15px, 3vw, 17px); color: var(--ink-soft);
    line-height: 1.5; max-width: 320px; margin: 0 auto 28px;
    opacity: 0; animation: fadeUp 0.8s ease 1.8s forwards;
  }

  .details { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
  .detail { opacity: 0; animation: fadeUp 0.8s ease forwards; }

  .detail-label {
    font-family: 'Tenor Sans', serif; font-size: 9px;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 4px;
  }
  .detail-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 3vw, 17px); color: var(--ink); line-height: 1.4;
  }
  .detail-value a {
    color: var(--ink); text-decoration: none;
    border-bottom: 1px solid var(--gold); padding-bottom: 1px;
    transition: color 0.2s;
  }
  .detail-value a:hover { color: var(--gold); }
  .detail-sub { font-style: italic; color: var(--ink-soft); font-size: 14px; margin-top: 2px; }

  .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px;
             opacity: 0; animation: fadeUp 0.8s ease 2.3s forwards; }

  .btn {
    display: inline-block; padding: 16px 28px;
    font-family: 'Tenor Sans', serif; font-size: 12px;
    letter-spacing: 0.3em; text-transform: uppercase;
    text-decoration: none; text-align: center;
    border-radius: 2px; transition: all 0.3s ease;
    cursor: pointer; border: none;
  }
  .btn-primary { background: var(--ink); color: var(--cream-warm); border: 1px solid var(--ink); }
  .btn-primary:hover {
    background: var(--gold); border-color: var(--gold); color: var(--ink);
    transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201, 169, 97, 0.35);
  }
  .btn-secondary { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .btn-secondary:hover { background: var(--ink); color: var(--cream-warm); }

  .signoff {
    font-family: 'Caveat', cursive; font-size: 18px;
    color: var(--gold); margin-top: 26px;
    opacity: 0; animation: fadeUp 0.8s ease 2.5s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .card { padding: 40px 24px 28px; }
    .card-inner { padding: 28px 18px 24px; }
    .open-hint { font-size: 10px; padding: 10px 22px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="stage">
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="envelope-cover" id="envelopeCover"></div>
    <div class="open-hint" id="openHint">Tap to Open</div>
  </div>

  <div class="card" id="card">
    <div class="card-inner">

      <svg class="compass" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="20" cy="20" r="18"/>
        <circle cx="20" cy="20" r="13"/>
        <path d="M20 4 L23 20 L20 36 L17 20 Z" fill="currentColor" opacity="0.4"/>
        <path d="M4 20 L20 17 L36 20 L20 23 Z" fill="currentColor" opacity="0.2"/>
        <circle cx="20" cy="20" r="1.5" fill="currentColor"/>
      </svg>

      <div class="eyebrow" id="cEyebrow"></div>
      <div class="hosts" id="cHosts"></div>
      <div class="intro" id="cIntro"></div>
      <div class="honorees" id="cHonorees"></div>
      <div class="subhead" id="cSubhead"></div>
      <div class="feature" id="cFeature"></div>

      <div class="ornament">
        <div class="ornament-line"></div>
        <span class="ornament-shell">✦</span>
        <div class="ornament-line"></div>
      </div>

      <div class="tagline" id="cTagline"></div>

      <div class="details" id="cDetails"></div>

      <div class="actions" id="cActions"></div>

      <div class="signoff" id="cSignoff"></div>

    </div>
  </div>
</div>

<script>
  // ─── Apply config ─────────────────────────────────────────────────────
  const cfg = window.CARD_CONFIG;
  if (!cfg) { document.body.innerHTML = '<p style="color:#fff;padding:40px;">Missing config.js</p>'; throw new Error('no config'); }

  // Helper: render hosts/honorees with styled ampersand
  const styleAmp = (s) => (s || '').replace(/\s&\s/g, ' <span class="amp">&amp;</span> ');

  // Apply theme via CSS variables
  const root = document.documentElement;
  if (cfg.theme) {
    if (cfg.theme.ink)       root.style.setProperty('--ink', cfg.theme.ink);
    if (cfg.theme.inkSoft)   root.style.setProperty('--ink-soft', cfg.theme.inkSoft);
    if (cfg.theme.gold)      root.style.setProperty('--gold', cfg.theme.gold);
    if (cfg.theme.cream)     root.style.setProperty('--cream', cfg.theme.cream);
    if (cfg.theme.creamWarm) root.style.setProperty('--cream-warm', cfg.theme.creamWarm);
    if (cfg.theme.bgGradient) document.body.style.background = cfg.theme.bgGradient;
  }

  // Meta + page title
  document.title = cfg.meta?.title || "You're Invited";
  const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
  setMeta('meta[property="og:title"]', cfg.meta?.title);
  setMeta('meta[property="og:description"]', cfg.meta?.description);
  setMeta('meta[property="og:image"]', cfg.meta?.coverImage);
  setMeta('meta[name="twitter:title"]', cfg.meta?.title);
  setMeta('meta[name="twitter:description"]', cfg.meta?.description);
  setMeta('meta[name="twitter:image"]', cfg.meta?.coverImage);

  // Cover image + open hint
  document.getElementById('envelopeCover').style.backgroundImage = `url('${cfg.meta?.coverImage || 'cover.png'}')`;
  document.getElementById('openHint').textContent = cfg.coverHint || 'Tap to Open';

  // Card content
  const c = cfg.card || {};
  const set = (id, html) => { const el = document.getElementById(id); if (el && html != null && html !== '') el.innerHTML = html; else if (el && (html === '' || html == null)) el.style.display = 'none'; };

  set('cEyebrow',  c.eyebrow);
  set('cHosts',    styleAmp(c.hosts));
  set('cIntro',    c.intro);
  set('cHonorees', styleAmp(c.honorees));
  set('cSubhead',  c.subhead ? `— ${c.subhead} —` : '');
  set('cFeature',  c.feature);
  set('cTagline',  c.tagline);
  set('cSignoff',  c.signoff);

  // Details
  const detailsEl = document.getElementById('cDetails');
  (c.details || []).forEach((d, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'detail';
    wrap.style.animationDelay = (1.9 + i * 0.1) + 's';
    const valHtml = d.link
      ? `<a href="${d.link}" target="_blank" rel="noopener">${d.value}</a>`
      : d.value;
    const subHtml = d.sub ? `<div class="detail-sub">${d.sub}</div>` : '';
    wrap.innerHTML = `
      <div class="detail-label">${d.label}</div>
      <div class="detail-value">${valHtml}${subHtml}</div>
    `;
    detailsEl.appendChild(wrap);
  });

  // Buttons
  const actionsEl = document.getElementById('cActions');
  (c.buttons || []).forEach((b) => {
    const a = document.createElement('a');
    a.className = 'btn ' + (b.primary ? 'btn-primary' : 'btn-secondary');
    a.href = b.href;
    a.textContent = b.label;
    if (b.external) { a.target = '_blank'; a.rel = 'noopener'; }
    actionsEl.appendChild(a);
  });

  // Starfield (optional)
  if (cfg.theme?.showStars !== false) {
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsContainer.appendChild(star);
    }
  }

  function openEnvelope() {
    const env = document.getElementById('envelope');
    const card = document.getElementById('card');
    if (env.classList.contains('opened')) return;
    env.classList.add('opened');
    setTimeout(() => {
      card.classList.add('shown');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 600);
  }
</script>
</body>
</html>
